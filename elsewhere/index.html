<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>别处 · 入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #111827;
            border: 1px solid #1e3a5f;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(30, 58, 95, 0.3);
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #1e3a5f;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #7aa9d9;
            font-size: 22px;
            letter-spacing: 6px;
            font-weight: 400;
        }
        .header p {
            color: #4a7a9f;
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .field {
            margin-bottom: 20px;
        }
        .field label {
            display: block;
            color: #7aa9d9;
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1524;
            border: 1px solid #1e3a5f;
            color: #c8dbe9;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border 0.3s;
            border-radius: 4px;
        }
        .field input:focus {
            border-color: #4a8ab5;
        }
        .field input::placeholder {
            color: #2a4a6f;
            font-size: 14px;
        }
        .warning {
            background: #1a0f0a;
            border-left: 3px solid #8a4a3a;
            padding: 12px 16px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }
        .warning p {
            color: #aa7a6a;
            font-size: 12px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            border: 1px solid #2a5a7f;
            color: #c8dbe9;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2a4a6f;
            border-color: #4a8ab5;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #2a4a6f;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .footer span {
            color: #3a5a7a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✦ 别处 · 入口 ✦</h1>
            <p>你已进入信号范围</p>
        </div>

        <form id="entryForm" onsubmit="return false;">
            <div class="field">
                <label>▸ 你的身份标识</label>
                <input type="text" id="playerId" placeholder="输入一个名字或代号..." maxlength="30" autofocus>
            </div>

            <div class="warning">
                <p>⚠ 一旦确认，该标识将关联你在此地的所有痕迹。<br>
                你无法删除，只能遗忘。请谨慎选择。</p>
            </div>

            <button type="submit" class="btn" onclick="enterSite()">▸ 进入信号区</button>
        </form>

        <div class="footer">
            <span>EW-</span> · 信号站 · 2026
        </div>
    </div>

    <script>
        function enterSite() {
            const input = document.getElementById('playerId');
            const id = input.value.trim();
            if (!id) {
                input.style.borderColor = '#8a4a3a';
                input.placeholder = '需要输入一个代号才能进入';
                setTimeout(() => {
                    input.style.borderColor = '#1e3a5f';
                    input.placeholder = '输入一个名字或代号...';
                }, 2000);
                return;
            }
            // 保存到 localStorage，供后续所有页面使用
            localStorage.setItem('ew_player_id', id);
            // 跳转到论坛
            window.location.href = '/elsewhere/forum.html
                /';
        }

        // 回车键触发
        document.getElementById('playerId').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                enterSite();
            }
        });
    </script>
</body>
</html>
